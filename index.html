<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Vigilantes - DPEMT</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Roboto', sans-serif; margin:0; background:#f4f6f8; }
  header { background:#004080; color:#fff; padding:20px; text-align:center; }
  main { padding:20px; max-width:900px; margin:auto; }
  h2,h3,h4 { color:#004080; }
  input, select, button { padding:8px; margin:5px 0; border-radius:4px; border:1px solid #ccc; width:100%; }
  button { cursor:pointer; background:#004080; color:#fff; border:none; transition:0.3s; }
  button:hover { background:#0059b3; }
  table { width:100%; border-collapse:collapse; margin-top:10px; background:#fff; }
  th, td { padding:10px; border:1px solid #ddd; text-align:left; }
  th { background:#e6f0ff; }
  .hidden { display:none; }
  .card { background:#fff; padding:15px; margin-bottom:20px; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<header>
  <h1>Painel de Vigilantes - DPEMT</h1>
</header>

<main>
  <!-- Login -->
  <div class="card" id="login-card">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Senha" required>
    <button id="login-btn">Entrar</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">

    <div style="text-align:right; margin-bottom:20px;">
      <span id="user-name" style="margin-right:20px;"></span>
      <button id="logout">Sair</button>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden card">
      <h3>Cadastrar Usuário</h3>
      <input type="email" id="new-email" placeholder="Email do usuário">
      <input type="password" id="new-password" placeholder="Senha">
      <select id="new-role">
        <option value="" disabled selected>Role</option>
        <option value="admin">Administrador</option>
        <option value="viewer">Visualizador</option>
      </select>
      <button id="register-user-btn">Cadastrar Usuário</button>

      <h3>Adicionar Vigilante</h3>
      <input type="text" id="nome" placeholder="Nome">
      <input type="text" id="funcao" placeholder="Função">
      <input type="text" id="turno" placeholder="Turno">
      <button id="add-vigilante-btn">Adicionar Vigilante</button>
    </div>

    <!-- Lista Vigilantes -->
    <div class="card">
      <h3>Lista de Vigilantes</h3>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Função</th>
            <th>Turno</th>
            <th id="acoes-col" class="hidden">Ações</th>
          </tr>
        </thead>
        <tbody id="vigilantes-list"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const loginCard = document.getElementById("login-card");
const dashboard = document.getElementById("dashboard");
const adminPanel = document.getElementById("admin-panel");
const userName = document.getElementById("user-name");
const acoesCol = document.getElementById("acoes-col");
const vigilantesList = document.getElementById("vigilantes-list");

let currentRole = "";

// 🔹 Login simulado
document.getElementById("login-btn").addEventListener("click", async ()=>{
  const email = document.getElementById("email").value.trim();
  if(!email) return alert("Informe o email");
  // Simulação de role: admin@dpe.com = admin, resto = viewer
  currentRole = email==="admin@dpe.com"?"admin":"viewer";

  loginCard.classList.add("hidden");
  dashboard.classList.remove("hidden");
  userName.textContent = email;
  if(currentRole==="admin") adminPanel.classList.remove("hidden");
  loadVigilantes();
});

// 🔹 Logout
document.getElementById("logout").addEventListener("click", ()=>{
  dashboard.classList.add("hidden");
  loginCard.classList.remove("hidden");
  vigilantesList.innerHTML = "";
});

// 🔹 Cadastrar Usuário
document.getElementById("register-user-btn").addEventListener("click", async ()=>{
  const email = document.getElementById("new-email").value.trim();
  const password = document.getElementById("new-password").value.trim();
  const role = document.getElementById("new-role").value;
  if(!email||!password||!role) return alert("Preencha todos os campos");

  const res = await fetch("http://localhost:3000/create-user",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email,password,role })
  });
  const data = await res.json();
  alert(data.success?"Usuário cadastrado!":data.error);
});

// 🔹 Adicionar Vigilante
document.getElementById("add-vigilante-btn").addEventListener("click", async ()=>{
  const nome = document.getElementById("nome").value.trim();
  const funcao = document.getElementById("funcao").value.trim();
  const turno = document.getElementById("turno").value.trim();
  if(!nome||!funcao||!turno) return alert("Preencha todos os campos");

  await fetch("http://localhost:3000/vigilantes",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({nome,funcao,turno})
  });
  document.getElementById("nome").value="";
  document.getElementById("funcao").value="";
  document.getElementById("turno").value="";
  loadVigilantes();
});

// 🔹 Carregar vigilantes
async function loadVigilantes(){
  const res = await fetch("http://localhost:3000/vigilantes");
  const vigilantes = await res.json();
  vigilantesList.innerHTML="";
  vigilantes.forEach(v=>{
    const tr = document.createElement("tr");
    tr.innerHTML=`
      <td>${v.nome}</td>
      <td>${v.funcao}</td>
      <td>${v.turno}</td>
      <td>${currentRole==="admin"?`<button onclick="edit('${v.id}')">Editar</button> <button onclick="del('${v.id}')">Excluir</button>`:""}</td>
    `;
    vigilantesList.appendChild(tr);
  });
}

// 🔹 Editar/Excluir
window.edit = async (id)=>{
  const nome = prompt("Nome:");
  const funcao = prompt("Função:");
  const turno = prompt("Turno:");
  if(nome && funcao && turno){
    await fetch(`http://localhost:3000/vigilantes/${id}`,{
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({nome,funcao,turno})
    });
    loadVigilantes();
  }
}

window.del = async (id)=>{
  if(confirm("Deseja excluir?")){
    await fetch(`http://localhost:3000/vigilantes/${id}`,{method:"DELETE"});
    loadVigilantes();
  }
}
</script>
</body>
</html>
